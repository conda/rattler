[workspace]
name = "py-rattler"
authors = [
  "Bas Zalmstra <bas@prefix.dev>",
  "Tarun Pratap Singh <pratapsinghtarun9@gmail.com>",
]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]
license = "BSD-3-Clause"
preview = ["pixi-build"]

[package]
name = "py-rattler"

[package.build]
backend = { name = "pixi-build-python", git = "https://github.com/pavelzw/pixi", branch = "abi3", subdirectory = "crates/pixi_build_python" }
[package.host-dependencies]
maturin = "*"
python = "3.9.*"
[package.target.osx-arm64.build-dependencies]
# https://conda-forge.zulipchat.com/#narrow/channel/457337-general/topic/macOS.20clang.2021.20.2F.20LTO.20issues/near/578390360
clangdev = "*"
[package.build.config]
abi3 = true
compilers = ["c", "rust"]
env = { MATURIN_PEP517_ARGS = "--features pty --locked" }

[feature.test.dependencies]
py-rattler = { path = "." }
python = "3.10.*"
# boto3 = "*"

requests = ">=2.32.3,<3"
types-requests = ">=2.32,<3"
types-networkx = "*"

ruff = ">=0.14.1"
mypy = ">=1.17.0,<2"
nushell = ">=0.106.1"

pytest = ">=8.4.1,<9"
pytest-asyncio = ">=1.0.0,<2"
pytest-xprocess = ">=1.0.2,<2"

# used in examples
typer = "*"
# for rust-analyzer
# rust = ">=1.93.1"
rust-src = ">=1.93.1"

[feature.test.tasks]
test = "pytest --doctest-modules --ignore=rattler/pty/pty_process.py --ignore=rattler/pty/pty_session.py"
fmt-python = "ruff format rattler examples tests"
fmt-rust = "cargo fmt --all"
lint-python = "ruff check ."
lint-rust = "cargo clippy --all"
ensure-version-synced = "nu scripts/ensure-version-synced.nu"
fmt = { depends-on = ["fmt-python", "fmt-rust"] }
lint = { depends-on = [
  "ensure-version-synced",
  "type-check",
  "lint-python",
  "lint-rust",
] }
type-check = "mypy"

# checks for the CI
fmt-rust-check = "cargo fmt --all --check"
fmt-python-check = "ruff format rattler examples tests --diff"
fmt-check = { depends-on = ["fmt-python-check", "fmt-rust-check"] }

[feature.docs.dependencies]
mkdocs = ">=1.6.1,<2"
mkdocstrings-python = ">=2.0.1,<3"
mkdocstrings = ">=1.0.0,<2"
mkdocs-material = ">=9.7.0,<10"
mdx_truly_sane_lists = ">=1.3,<2"
cairosvg = ">=2.8.2,<3"
pillow = ">=12.0.0,<13"
ruff = ">=0.14.9,<0.15"
mkdocs-llmstxt = ">=0.4.0,<0.5"
mike = ">=2.1.3,<3"
python = { build-number = ">10" }


[feature.docs.tasks]
docs = { cmd = "mkdocs serve", description = "Serve the docs locally", depends-on = [
  "download-font",
] }
build-docs = { cmd = "mkdocs build --strict", depends-on = ["download-font"] }
download-font = { cmd = "bash docs/layouts/download-font-to-cache.sh" }
deploy-latest = { cmd = "mike deploy --push --update-aliases $RELEASE_VERSION latest", depends-on = [
  "download-font",
] }
deploy-dev = { cmd = "mike deploy --push dev devel", depends-on = [
  "download-font",
] }

[feature.repl.dependencies]
ipython = ">=8.29.0,<9"
[feature.repl.tasks]
repl = "ipython"

[environments]
test = { features = ["test"], solve-group = "default" }
docs = ["docs"]
repl = ["repl"]
